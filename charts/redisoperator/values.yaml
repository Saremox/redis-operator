# Default values for redis-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Name of the image repository to pull the container image from.
image:
  repository: ghcr.io/saremox/redis-operator
  pullPolicy: IfNotPresent
  tag: ""
  # Deprecated: prefer `operator.*` values or `operator.extraArgs`.
  cli_args: ""

imagePullSecrets: []

imageCredentials:
  create: false
  registry: ""
  username: ""
  password: ""
  email: ""
  # Use existing secrets in the release namespace.
  existsSecrets: []

updateStrategy:
  type: RollingUpdate

replicas: 1

# A name in place of the chart name for `app:` labels.
nameOverride: ""

# A name to substitute for the full names of resources.
fullnameOverride: ""

# The name of the Namespace to deploy
# If not set, `.Release.Namespace` is used
namespace: null

serviceAccount:
  # Enable service account creation.
  create: true
  # Annotations to be added to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

rbac:
  # Enable RBAC resource creation.
  create: true

service:
  type: ClusterIP
  port: 9710

container:
  port: 9710

# Pod-level security context.
podSecurityContext:
  fsGroup: 1000

# Container [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context-1) for details.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: 
      - ALL

# Deprecated: use `podSecurityContext` and `containerSecurityContext`.
securityContext: {}

# Container resource [requests and limits](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#resources) for details.
# @default -- No requests or limits.
resources: {}
#   requests:
#     cpu: 100m
#     memory: 128Mi
#   limits:
#     cpu: 100m
#     memory: 128Mi

### Monitoring
###############
monitoring:
  # Enable Prometheus PodMonitor to monitor the operator.
  enabled: false
  serviceMonitor: false
  serviceAnnotations: {}
  prometheus:
    name: unknown

# Operator CLI flags rendered as container args.
operator:
  logLevel: ""
  supportedNamespacesRegex: ""
  listenAddress: ""
  metricsPath: ""
  k8sCliQpsLimit: null
  k8sCliBurstableLimit: null
  concurrency: null
  syncInterval: null
  extraArgs: []

# Extra environment variables for the operator container.
extraEnv: []

# Annotations to be added to pods and deployments.
annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

priorityClassName: ""
