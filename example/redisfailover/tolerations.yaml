apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redis
spec:
  redis:
    replicas: 3
    tolerations:
      - effect: NoExecute
        key: dedicated
        operator: Equal
        value: production
  sentinel:
    enabled: true
    replicas: 3
    tolerations:
      - effect: NoExecute
        key: dedicated
        operator: Equal
        value: production
